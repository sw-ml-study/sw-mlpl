[package]
edition = "2021"
name = "mlx-rs"
version = "0.25.3"
authors = [
    "Minghua Wu <michael.wu1107@gmail.com>",
    "David Chavez <david@dcvz.io>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
