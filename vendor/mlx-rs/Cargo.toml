description = "Unofficial rust wrapper for Apple's mlx machine learning library."
documentation = "https://oxideai.github.io/mlx-rs/mlx_rs/"
readme = "README.md"
keywords = [
    "mlx",
    "deep-learning",
    "machine-learning",
]
categories = ["science"]
