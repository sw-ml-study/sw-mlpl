<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLPL — Array Programming Language for ML</title>
    <link data-trunk rel="rust" data-bin="mlpl-web" />
    <link data-trunk rel="icon" href="favicon.ico" />
    <style>
        /* Catppuccin Mocha */
        :root {
            --crust: #11111b;
            --mantle: #181825;
            --base: #1e1e2e;
            --surface0: #313244;
            --surface1: #45475a;
            --surface2: #585b70;
            --overlay0: #6c7086;
            --overlay1: #7f849c;
            --overlay2: #9399b2;
            --subtext0: #a6adc8;
            --subtext1: #bac2de;
            --text: #cdd6f4;
            --lavender: #b4befe;
            --blue: #89b4fa;
            --sapphire: #74c7ec;
            --sky: #89dceb;
            --teal: #94e2d5;
            --green: #a6e3a1;
            --yellow: #f9e2af;
            --peach: #fab387;
            --maroon: #eba0ac;
            --red: #f38ba8;
            --mauve: #cba6f7;
            --pink: #f5c2e7;
            --flamingo: #f2cdcd;
            --rosewater: #f5e0dc;
            --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
        }
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--mono);
            font-size: 15px;
            background: var(--base);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--surface1);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--blue);
        }
        header span {
            font-size: 15px;
            color: var(--overlay2);
        }
        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        footer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 20px;
            font-size: 0.85em;
            color: var(--overlay0);
            border-top: 1px solid var(--surface1);
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        footer a {
            color: var(--blue);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .footer-sep { color: var(--surface2); }

        /* GitHub corner */
        .github-corner {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 100;
            pointer-events: none;
        }
        .github-corner svg {
            pointer-events: auto;
            fill: var(--blue);
            color: var(--base);
        }
        .github-corner:hover .octo-arm {
            animation: octocat-wave 560ms ease-in-out;
        }
        @keyframes octocat-wave {
            0%, 100% { transform: rotate(0); }
            20%, 60% { transform: rotate(-25deg); }
            40%, 80% { transform: rotate(10deg); }
        }

        /* Header controls */
        .controls {
            margin-left: auto;
            margin-right: 60px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .demo-select {
            background: var(--surface0);
            color: var(--text);
            border: 1px solid var(--surface1);
            border-radius: 4px;
            padding: 6px 10px;
            font-family: var(--mono);
            font-size: 13px;
            cursor: pointer;
        }
        .demo-select:hover {
            border-color: var(--blue);
        }
        .ctrl-btn {
            background: var(--surface0);
            color: var(--text);
            border: 1px solid var(--surface1);
            border-radius: 4px;
            padding: 6px 12px;
            font-family: var(--mono);
            font-size: 13px;
            cursor: pointer;
        }
        .ctrl-btn:hover {
            background: var(--surface1);
            border-color: var(--blue);
        }
        .help-btn {
            background: var(--surface0);
            color: var(--blue);
            border: 1px solid var(--surface1);
            border-radius: 4px;
            width: 32px;
            height: 32px;
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .help-btn:hover {
            background: var(--surface1);
            border-color: var(--blue);
        }

        /* REPL output area */
        main {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .welcome {
            color: var(--overlay2);
            margin-bottom: 16px;
        }
        .welcome p {
            margin-bottom: 4px;
        }
        .welcome code {
            color: var(--peach);
            background: var(--surface0);
            padding: 1px 6px;
            border-radius: 3px;
        }
        .entry {
            margin-bottom: 8px;
        }
        .input-line {
            color: var(--text);
        }
        .prompt {
            color: var(--green);
            font-weight: 700;
        }
        .output-line {
            color: var(--subtext1);
            white-space: pre;
            margin-left: 0;
            font-family: var(--mono);
            font-size: 15px;
        }
        .output-line.error {
            color: var(--red);
        }

        /* Input row */
        .input-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-top: 1px solid var(--surface1);
            background: var(--mantle);
            flex-shrink: 0;
        }
        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 15px;
            margin-left: 4px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal {
            background: var(--mantle);
            border: 1px solid var(--surface1);
            border-radius: 8px;
            width: min(900px, 92vw);
            height: min(80vh, 800px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .modal-header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--surface1);
            padding: 0 8px;
            flex-shrink: 0;
        }
        .tabs {
            display: flex;
            flex: 1;
        }
        .tab {
            background: transparent;
            border: none;
            color: var(--overlay2);
            font-family: var(--mono);
            font-size: 14px;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab:hover {
            color: var(--text);
        }
        .tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--overlay2);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            padding: 8px 14px;
        }
        .close-btn:hover {
            color: var(--red);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .doc-content {
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.55;
            color: var(--subtext1);
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
